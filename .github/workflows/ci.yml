name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.2.21"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd

      - name: Set up Helm
        uses: azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a

      - name: Set up Ansible
        run: pipx install ansible-core

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run quality gates
        run: bun run ci

      - name: Run deployment validation
        run: bun run deploy:check

      - name: Run release metadata validation
        run: bun run release:check

      - name: Run local MCP integration smoke
        run: bun run integration:local
