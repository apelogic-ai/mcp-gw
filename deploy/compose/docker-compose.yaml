services:
  agentgateway:
    image: ${AGENTGATEWAY_IMAGE:-ghcr.io/apelogic-ai/agentgateway:v2026.07.17-apelogic.1}
    command:
      - --file
      - /etc/agentgateway/config.yaml
    ports:
      - "${GATEWAY_PORT:-8080}:3000"
    volumes:
      - ../../gateway/agentgateway/base.yaml:/etc/agentgateway/config.yaml:ro
    depends_on:
      - google-workspace

  google-workspace:
    build:
      context: ../..
      dockerfile: servers/google-workspace/wrapper/Dockerfile
    environment:
      PORT: "8080"
      GWS_BINARY_PATH: ${GWS_BINARY_PATH:-/app/node_modules/.bin/gws}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI}
      GOOGLE_OAUTH_SCOPES: ${GOOGLE_OAUTH_SCOPES:-}
      GOOGLE_TOKEN_ENCRYPTION_KEY: ${GOOGLE_TOKEN_ENCRYPTION_KEY}
      HOP1_PROFILE: ${HOP1_PROFILE:-google}
      HOP1_ISSUER: ${HOP1_ISSUER}
      HOP1_JWKS_URL: ${HOP1_JWKS_URL}
      HOP1_AUDIENCE: ${HOP1_AUDIENCE}
      HOP1_OAUTH_SCOPES: ${HOP1_OAUTH_SCOPES:-openid email}
      HOP1_EMAIL_CLAIM: ${HOP1_EMAIL_CLAIM:-email}
      HOP1_SUBJECT_CLAIM: ${HOP1_SUBJECT_CLAIM:-sub}
      HOP1_ISSUERS_JSON: ${HOP1_ISSUERS_JSON:-}
      OPA_POLICY_URL: ${OPA_POLICY_URL:-}
      GOOGLE_WORKSPACE_POLICY_FILE: ${GOOGLE_WORKSPACE_POLICY_FILE:-}
      AUDIT_LOG_PATH: ${AUDIT_LOG_PATH:-}
      TOKEN_STORE_DSN: ${TOKEN_STORE_DSN:-postgres://mcp:mcp@token-store:5432/mcp}
    volumes:
      - ${AUDIT_LOG_DIR:-/var/log/mcp-gw}:/var/log/mcp-gw
    depends_on:
      - token-store

  token-store:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mcp
      POSTGRES_USER: mcp
      POSTGRES_PASSWORD: mcp
    volumes:
      - token-store-data:/var/lib/postgresql/data
      - ../../servers/google-workspace/config/oauth-schema.sql:/docker-entrypoint-initdb.d/001-oauth-schema.sql:ro

volumes:
  token-store-data:
