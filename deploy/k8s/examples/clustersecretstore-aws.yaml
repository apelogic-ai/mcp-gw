# EXAMPLE - External Secrets Operator ClusterSecretStore backed by AWS Secrets
# Manager. Replace placeholders in a private config repo.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: <aws-region>
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
