global:
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []

agentgateway:
  enabled: true
  image: ghcr.io/apelogic-ai/agentgateway:v1.1.0-apelogic.1
  replicas: 2
  port: 8080
  backends:
    - name: google-workspace
      enabled: true
      serviceName: google-workspace
      port: 8080
      path: /mcp
    - name: db-mcp
      enabled: true
      serviceName: db-mcp
      port: 8080
      path: /mcp
    - name: github-mcp
      enabled: false
      serviceName: github-mcp
      port: 8082
      path: /mcp
  serviceAccount:
    create: true
    annotations: {}
    name: ""
  podAnnotations: {}
  podSecurityContext:
    runAsNonRoot: true
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  resources: {}
  ingress:
    enabled: true
    host: mcp.example.com
    className: ""
    annotations: {}
    tls: []
  hpa:
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

googleWorkspace:
  enabled: true
  image: mcp-gateway/google-workspace:dev
  replicas: 2
  port: 8080
  serviceAccount:
    create: true
    annotations: {}
    name: ""
  podAnnotations: {}
  podSecurityContext:
    runAsNonRoot: true
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
  resources: {}
  hpa:
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  policy:
    enabled: false
    mountPath: /etc/mcp-gw/google-workspace-policy.yaml
    yaml: ""
  env:
    PORT: "8080"
    GWS_BINARY_PATH: /app/node_modules/.bin/gws
    HOP1_PROFILE: google
    HOP1_EMAIL_CLAIM: email
    HOP1_SUBJECT_CLAIM: sub
  secretRef:
    name: google-workspace-runtime
    externalStore: aws-secrets-manager
    remoteKey: mcp-gateway/google-workspace

dbMcp:
  enabled: true
  image: mcp-gateway/db-mcp:dev
  replicas: 2
  port: 8080
  serviceAccount:
    create: true
    annotations: {}
    name: ""
  podAnnotations: {}
  podSecurityContext:
    runAsNonRoot: true
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
  resources: {}
  hpa:
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  env:
    MCP_TRANSPORT: http
    MCP_HOST: 0.0.0.0
    MCP_PORT: "8080"
    MCP_PATH: /mcp
    TOOL_MODE: shell
    TOOL_PROFILE: query
  secretRef:
    name: db-mcp-runtime
    externalStore: aws-secrets-manager
    remoteKey: mcp-gateway/db-mcp

githubMcp:
  enabled: false
  image: ghcr.io/github/github-mcp-server:v1.6.0
  replicas: 2
  port: 8082
  serviceAccount:
    create: true
    annotations: {}
    name: ""
  podAnnotations: {}
  podSecurityContext:
    runAsNonRoot: true
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  resources: {}
  hpa:
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  env:
    GITHUB_TOOLSETS: default,actions,code_security,discussions,notifications,orgs,projects
    GITHUB_HOST: ""
