{{- if .Values.agentgateway.enabled }}
{{ include "mcp-gateway.serviceAccount" (dict "root" . "component" "agentgateway" "values" .Values.agentgateway) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mcp-gateway.fullname" . }}-agentgateway-config
  labels:
    {{- include "mcp-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: agentgateway
data:
  config.yaml: |
    listeners:
      - name: public-mcp
        port: {{ .Values.agentgateway.port }}
        protocol: HTTP
    backends:
      mcp:
        targets:
{{- range .Values.agentgateway.backends }}
{{- if .enabled }}
{{- $host := .host | default "" }}
{{- if not $host }}
{{- $host = printf "http://%s-%s:%v%s" (include "mcp-gateway.fullname" $) .serviceName (.port | default 8080) (.path | default "/mcp") }}
{{- end }}
          - name: {{ .name }}
            policies:
              backendAuth:
                passthrough: {}
            mcp:
              host: {{ $host }}
{{- end }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp-gateway.fullname" . }}-agentgateway
  labels:
    {{- include "mcp-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: agentgateway
spec:
  replicas: {{ .Values.agentgateway.replicas }}
  selector:
    matchLabels:
      {{- include "mcp-gateway.selectorLabels" (dict "Chart" .Chart "Release" .Release "Values" .Values "component" "agentgateway") | nindent 6 }}
  template:
    metadata:
      {{- with .Values.agentgateway.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "mcp-gateway.selectorLabels" (dict "Chart" .Chart "Release" .Release "Values" .Values "component" "agentgateway") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "mcp-gateway.serviceAccountName" (dict "root" . "component" "agentgateway" "values" .Values.agentgateway) }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.agentgateway.podSecurityContext | nindent 8 }}
      containers:
        - name: agentgateway
          image: {{ .Values.agentgateway.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- toYaml .Values.agentgateway.securityContext | nindent 12 }}
          args:
            - --config
            - /etc/agentgateway/config.yaml
          ports:
            - name: http
              containerPort: {{ .Values.agentgateway.port }}
          volumeMounts:
            - name: config
              mountPath: /etc/agentgateway/config.yaml
              subPath: config.yaml
              readOnly: true
          {{- with .Values.agentgateway.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "mcp-gateway.fullname" . }}-agentgateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp-gateway.fullname" . }}-agentgateway
  labels:
    {{- include "mcp-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: agentgateway
spec:
  type: ClusterIP
  selector:
    {{- include "mcp-gateway.selectorLabels" (dict "Chart" .Chart "Release" .Release "Values" .Values "component" "agentgateway") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.agentgateway.port }}
      targetPort: http
---
{{- if .Values.agentgateway.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "mcp-gateway.fullname" . }}-agentgateway
  labels:
    {{- include "mcp-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: agentgateway
  {{- with .Values.agentgateway.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.agentgateway.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.agentgateway.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.agentgateway.ingress.host }}
      http:
        paths:
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: {{ include "mcp-gateway.fullname" . }}-agentgateway
                port:
                  name: http
{{- end }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "mcp-gateway.fullname" . }}-agentgateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "mcp-gateway.fullname" . }}-agentgateway
  minReplicas: {{ .Values.agentgateway.hpa.minReplicas }}
  maxReplicas: {{ .Values.agentgateway.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.agentgateway.hpa.targetCPUUtilizationPercentage }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "mcp-gateway.fullname" . }}-agentgateway
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "mcp-gateway.selectorLabels" (dict "Chart" .Chart "Release" .Release "Values" .Values "component" "agentgateway") | nindent 6 }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mcp-gateway.fullname" . }}-agentgateway
spec:
  podSelector:
    matchLabels:
      {{- include "mcp-gateway.selectorLabels" (dict "Chart" .Chart "Release" .Release "Values" .Values "component" "agentgateway") | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.agentgateway.port }}
{{- end }}
