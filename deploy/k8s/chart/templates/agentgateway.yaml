{{- if .Values.agentgateway.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mcp-gateway.fullname" . }}-agentgateway-config
  labels:
    {{- include "mcp-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: agentgateway
data:
  config.yaml: |
    listeners:
      - name: public-mcp
        port: {{ .Values.agentgateway.port }}
        protocol: HTTP
    backends:
      mcp:
        targets:
          - name: google-workspace
            policies:
              backendAuth:
                passthrough: {}
            mcp:
              host: http://{{ include "mcp-gateway.fullname" . }}-google-workspace:{{ .Values.googleWorkspace.port }}/mcp
          - name: db-mcp
            policies:
              backendAuth:
                passthrough: {}
            mcp:
              host: http://{{ include "mcp-gateway.fullname" . }}-db-mcp:{{ .Values.dbMcp.port }}/mcp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp-gateway.fullname" . }}-agentgateway
  labels:
    {{- include "mcp-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: agentgateway
spec:
  replicas: {{ .Values.agentgateway.replicas }}
  selector:
    matchLabels:
      {{- include "mcp-gateway.selectorLabels" (dict "Chart" .Chart "Release" .Release "Values" .Values "component" "agentgateway") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mcp-gateway.selectorLabels" (dict "Chart" .Chart "Release" .Release "Values" .Values "component" "agentgateway") | nindent 8 }}
    spec:
      containers:
        - name: agentgateway
          image: {{ .Values.agentgateway.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args:
            - --config
            - /etc/agentgateway/config.yaml
          ports:
            - name: http
              containerPort: {{ .Values.agentgateway.port }}
          volumeMounts:
            - name: config
              mountPath: /etc/agentgateway/config.yaml
              subPath: config.yaml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "mcp-gateway.fullname" . }}-agentgateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp-gateway.fullname" . }}-agentgateway
  labels:
    {{- include "mcp-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: agentgateway
spec:
  type: ClusterIP
  selector:
    {{- include "mcp-gateway.selectorLabels" (dict "Chart" .Chart "Release" .Release "Values" .Values "component" "agentgateway") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.agentgateway.port }}
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "mcp-gateway.fullname" . }}-agentgateway
  labels:
    {{- include "mcp-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: agentgateway
spec:
  rules:
    - host: {{ .Values.agentgateway.host }}
      http:
        paths:
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: {{ include "mcp-gateway.fullname" . }}-agentgateway
                port:
                  name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "mcp-gateway.fullname" . }}-agentgateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "mcp-gateway.fullname" . }}-agentgateway
  minReplicas: {{ .Values.agentgateway.hpa.minReplicas }}
  maxReplicas: {{ .Values.agentgateway.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.agentgateway.hpa.targetCPUUtilizationPercentage }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "mcp-gateway.fullname" . }}-agentgateway
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "mcp-gateway.selectorLabels" (dict "Chart" .Chart "Release" .Release "Values" .Values "component" "agentgateway") | nindent 6 }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mcp-gateway.fullname" . }}-agentgateway
spec:
  podSelector:
    matchLabels:
      {{- include "mcp-gateway.selectorLabels" (dict "Chart" .Chart "Release" .Release "Values" .Values "component" "agentgateway") | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.agentgateway.port }}
{{- end }}
